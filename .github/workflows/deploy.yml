name: Deploy to Proxmox

on:
  push:
    branches:
      - main
  workflow_dispatch: # Mengizinkan deploy manual pakai tombol di web

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    # Memberi izin GITHUB_TOKEN bawaan untuk push ke registry GitHub
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-to-proxmox:
    needs: build-and-push-image
    runs-on: self-hosted
    steps:
      - name: Deploy to Docker (Local Runner)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Konversi nama repo jadi huruf kecil (kewajiban dari Docker)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_LATEST="ghcr.io/$REPO_LOWER:latest"
          
          # Login ke GitHub Container Registry dari Proxmox
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Pull image terbaru
          docker pull $IMAGE_LATEST
          
          # Stop & hapus container lama
          docker stop porto-v2 || true
          docker rm porto-v2 || true
          
          # Jalankan container baru
          docker run -d \
            --name porto-v2 \
            --restart unless-stopped \
            -p 3000:3000 \
            $IMAGE_LATEST
          
          # Bersihkan image lama
          docker image prune -f
