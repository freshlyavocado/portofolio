stages:
  - build
  - deploy

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

# ================================
# Stage 1: Build & Push Docker Image
# ================================
docker-build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
  script:
    # Build Docker image
    - docker build -t $IMAGE_TAG -t $IMAGE_LATEST .
    # Push ke registry
    - docker push $IMAGE_TAG
    - docker push $IMAGE_LATEST
  only:
    - main

# ================================
# Stage 2: Deploy ke Server
# ================================
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - |
      ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST << 'EOF'
        # Login ke GitLab Registry dari server
        echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
        
        # Pull image terbaru
        docker pull $IMAGE_LATEST
        
        # Stop container lama (kalau ada)
        docker stop porto-v2 || true
        docker rm porto-v2 || true
        
        # Jalankan container baru
        docker run -d \
          --name porto-v2 \
          --restart unless-stopped \
          -p 3000:3000 \
          $IMAGE_LATEST
        
        # Bersihkan image lama
        docker image prune -f
      EOF
  only:
    - main
  when: manual    # Deploy manual (klik tombol) — hapus baris ini kalau mau full auto
