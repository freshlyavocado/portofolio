services:
  porto-v2:
    image: <GITLAB_REGISTRY_IMAGE>:latest # ← nanti diganti
    container_name: porto-v2
    restart: unless-stopped
    ports:
      - "3000:3000" # host:container
    environment:
      - NODE_ENV=production
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
